<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molly VandeVoort, JD, MPH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #1a1814;
      --muted: #6b665d;
      --rule: #d6d0c4;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 24px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    main {
      width: 100%;
      max-width: 620px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 6.5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.005em;
    }
    h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
    }
    .tagline {
      margin: 2.25rem auto 1rem auto;
      max-width: 520px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.1rem, 1.9vw, 1.35rem);
      line-height: 1.55;
      color: var(--ink);
    }
    .scope {
      margin: 0;
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .contact {
      margin: 3.25rem 0 0 0;
      font-size: 0.95rem;
      color: var(--muted);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .contact a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: border-color 0.2s ease;
    }
    .contact a:hover {
      border-color: var(--ink);
    }
    .contact .sep {
      color: var(--rule);
    }
    @media (max-width: 520px) {
      .tagline { font-size: 1.05rem; }
      .scope { letter-spacing: 0.18em; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Molly VandeVoort, <em>JD, MPH</em></h1>
    <p class="tagline">
      Independent advisory work in healthcare compliance, regulatory operations, data governance, and policy.
    </p>
    <p class="scope">New engagements by referral</p>
    <p class="contact">
      <span>Montana</span>
      <span class="sep">·</span>
      <a href="mailto:molly@vandevoortadvisory.com">molly@vandevoortadvisory.com</a>
    </p>
  </main>
</body>
</html>
