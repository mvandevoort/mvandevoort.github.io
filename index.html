<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molly VandeVoort, JD, MPH</title>

  <style>
    :root {
      --text: #1f2933;
      --muted: #5f6b7a;
      --rule: #d8dee6;
      --background: #f8f7f3;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0, transparent 32%),
        var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      padding: 64px 56px;
      border: 1px solid var(--rule);
      box-shadow: 0 24px 80px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 5vw, 4rem);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .rule {
      width: 72px;
      height: 1px;
      background: var(--text);
      margin: 32px 0 28px;
    }

    .focus {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(1rem, 2vw, 1.15rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.8;
    }

    .meta {
      margin-top: 44px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta span {
      display: inline-flex;
      align-items: center;
    }

    .meta span + span::before {
      content: "";
      width: 4px;
      height: 4px;
      background: var(--rule);
      border-radius: 999px;
      margin-right: 18px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
    }

    a:hover {
      border-bottom-color: var(--text);
    }

    @media (max-width: 640px) {
      body {
        padding: 20px;
        align-items: flex-start;
      }

      main {
        padding: 44px 32px;
        margin-top: 48px;
      }

      .meta {
        display: block;
      }

      .meta span {
        display: block;
        margin-bottom: 10px;
      }

      .meta span + span::before {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Molly VandeVoort, JD, MPH</h1>

    <div class="rule"></div>

    <p class="focus">
      Healthcare Regulatory Strategy • Compliance • Privacy • Enforcement
    </p>

    <div class="meta">
      <span>Montana</span>
      <span>
        <a href="mailto:molly@vandevoortadvisory.com">
          molly@vandevoortadvisory.com
        </a>
      </span>
    </div>
  </main>
</body>
</html>
